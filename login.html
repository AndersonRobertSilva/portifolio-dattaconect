<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Datta Conect</title>
    <meta name="description" content="Acesse sua área de membros Datta Conect.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=1.1">
    <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>
    <header id="header">
        <div class="container nav-wrapper">
            <a href="/" class="logo">Datta<span>Conect</span></a>
            <nav class="desktop-nav">
                <ul>
                    <li><a href="/">Início</a></li>
                    <li><a href="/sobre">Sobre nós</a></li>
                    <li><a href="/projetos">Projetos</a></li>
                    <li><a href="/laboratorio">Laboratório</a></li>
                    <li><a href="/treinamentos">Treinamentos</a></li>
                </ul>
            </nav>
            <a href="https://wa.me/5511969525075" target="_blank" class="btn btn-outline"><i class="fab fa-whatsapp"></i> Fale Conosco</a>
            <button class="mobile-menu-btn" aria-label="Abrir Menu"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <div class="mobile-menu-overlay"></div>
    <nav class="mobile-menu">
        <button class="close-menu-btn"><i class="fas fa-times"></i></button>
        <ul>
            <li><a href="/">Início</a></li>
            <li><a href="/sobre">Sobre nós</a></li>
            <li><a href="/projetos">Projetos</a></li>
            <li><a href="/laboratorio">Laboratório</a></li>
            <li><a href="/treinamentos">Treinamentos</a></li>
            <li><a href="https://wa.me/5511969525075" class="btn btn-primary" target="_blank">Fale Conosco</a></li>
        </ul>
    </nav>

    <section class="auth-section">
        <div class="hero-bg-glow"></div>
        <div class="container">
            <div class="auth-card glass-card reveal-up">
                <div class="auth-header">
                    <div class="auth-icon"><i class="fas fa-lock"></i></div>
                    <h1>Bem-vindo de volta</h1>
                    <p>Acesse sua área de membros</p>
                </div>

                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="senha"><i class="fas fa-key"></i> Senha</label>
                        <input type="password" id="senha" placeholder="Sua senha" required>
                    </div>

                    <div id="login-error" class="auth-error" style="display:none;"></div>

                    <button type="submit" class="btn btn-primary btn-lg btn-full" id="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>
                </form>

                <div class="auth-divider"><span>ou</span></div>

                <div class="auth-footer">
                    <p>Não tem uma conta? <a href="/cadastro" class="auth-link">Criar conta grátis</a></p>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        // Redirect if already logged in
        if (localStorage.getItem('datta_token')) window.location.href = '/membros';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('login-error');
            errorEl.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        senha: document.getElementById('senha').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Erro ao fazer login');
                localStorage.setItem('datta_token', data.token);
                localStorage.setItem('datta_user', JSON.stringify(data.user));
                window.location.href = data.user.role === 'admin' ? '/admin' : '/membros';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
            }
        });
    </script>
</body>
</html>
