<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Datta Conect</title>
    <meta name="description" content="Crie sua conta gratuita na área de membros Datta Conect.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=1.1">
    <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>
    <header id="header">
        <div class="container nav-wrapper">
            <a href="/" class="logo">Datta<span>Conect</span></a>
            <nav class="desktop-nav">
                <ul>
                    <li><a href="/">Início</a></li>
                    <li><a href="/sobre">Sobre nós</a></li>
                    <li><a href="/projetos">Projetos</a></li>
                    <li><a href="/laboratorio">Laboratório</a></li>
                    <li><a href="/treinamentos">Treinamentos</a></li>
                </ul>
            </nav>
            <a href="https://wa.me/5511969525075" target="_blank" class="btn btn-outline"><i class="fab fa-whatsapp"></i> Fale Conosco</a>
            <button class="mobile-menu-btn" aria-label="Abrir Menu"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <div class="mobile-menu-overlay"></div>
    <nav class="mobile-menu">
        <button class="close-menu-btn"><i class="fas fa-times"></i></button>
        <ul>
            <li><a href="/">Início</a></li>
            <li><a href="/sobre">Sobre nós</a></li>
            <li><a href="/projetos">Projetos</a></li>
            <li><a href="/laboratorio">Laboratório</a></li>
            <li><a href="/treinamentos">Treinamentos</a></li>
            <li><a href="https://wa.me/5511969525075" class="btn btn-primary" target="_blank">Fale Conosco</a></li>
        </ul>
    </nav>

    <section class="auth-section">
        <div class="hero-bg-glow"></div>
        <div class="container">
            <div class="auth-card glass-card reveal-up">
                <div class="auth-header">
                    <div class="auth-icon"><i class="fas fa-user-plus"></i></div>
                    <h1>Criar sua Conta</h1>
                    <p>Acesse treinamentos exclusivos gratuitamente</p>
                </div>

                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label for="nome"><i class="fas fa-user"></i> Nome completo</label>
                        <input type="text" id="nome" placeholder="Seu nome completo" required>
                    </div>
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="senha"><i class="fas fa-key"></i> Senha</label>
                        <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="senha2"><i class="fas fa-key"></i> Confirmar Senha</label>
                        <input type="password" id="senha2" placeholder="Repita a senha" required minlength="6">
                    </div>

                    <div id="register-error" class="auth-error" style="display:none;"></div>
                    <div id="register-success" class="auth-success" style="display:none;"></div>

                    <button type="submit" class="btn btn-primary btn-lg btn-full" id="register-btn">
                        <i class="fas fa-rocket"></i> Criar Conta
                    </button>
                </form>

                <div class="auth-divider"><span>ou</span></div>

                <div class="auth-footer">
                    <p>Já tem uma conta? <a href="/login" class="auth-link">Fazer login</a></p>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        if (localStorage.getItem('datta_token')) window.location.href = '/membros';

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            const errorEl = document.getElementById('register-error');
            const successEl = document.getElementById('register-success');
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            const senha = document.getElementById('senha').value;
            const senha2 = document.getElementById('senha2').value;
            if (senha !== senha2) { errorEl.textContent = 'As senhas não coincidem'; errorEl.style.display = 'block'; return; }
            if (senha.length < 6) { errorEl.textContent = 'A senha deve ter no mínimo 6 caracteres'; errorEl.style.display = 'block'; return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Criando conta...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome: document.getElementById('nome').value,
                        email: document.getElementById('email').value,
                        senha
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Erro ao criar conta');
                localStorage.setItem('datta_token', data.token);
                localStorage.setItem('datta_user', JSON.stringify(data.user));
                successEl.textContent = 'Conta criada com sucesso! Redirecionando...';
                successEl.style.display = 'block';
                setTimeout(() => window.location.href = '/membros', 1500);
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-rocket"></i> Criar Conta';
            }
        });
    </script>
</body>
</html>
